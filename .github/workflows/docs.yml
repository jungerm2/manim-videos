name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Manim + Manim Slides)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev \
            libgl1-mesa-glx libegl1-mesa libxrandr2 libxss1 libxcursor1 \
            libxcomposite1 libxi6 libxtst6 libxinerama1

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache documentation assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: assets/big_buck_bunny_720p_h264.mov
          key: assets-big-buck-bunny-720p

      - name: Download documentation assets
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: |
          mkdir -p assets
          wget https://archive.org/download/BigBuckBunny/big_buck_bunny_720p_h264.mov \
               -O assets/big_buck_bunny_720p_h264.mov

      - name: Set up Python
        run: uv python install

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Build HTML docs
        run: uv run --group docs sphinx-build -b html docs/ docs/build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
