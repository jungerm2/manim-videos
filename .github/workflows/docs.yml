name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  USES_TEX: false
  DISPLAY: :99

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Manim + Manim Slides)
        run: |
          sudo apt-get update
          sudo apt-get install libcairo2-dev libpango1.0-dev ffmpeg freeglut3-dev -y

      - name: Setup TeX Live
        if: ${{ env.USES_TEX == 'true' }}
        uses: zauguin/install-texlive@v4
        with:
          packages: >-
            amsmath
            babel-english
            cbfonts-fd
            cm-super
            count1to
            ctex
            doublestroke
            dvisvgm
            everysel
            fontspec
            frcursive
            fundus-calligra
            gnu-freefont
            jknapltx
            latex-bin
            mathastext
            microtype
            multitoc
            physics
            prelim2e
            preview
            ragged2e
            relsize
            rsfs
            setspace
            standalone
            tipa
            wasy
            wasysym
            xcolor
            xetex
            xkeyval
            psnfss

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache documentation assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: assets/big_buck_bunny_720p_h264.mov
          key: assets-big-buck-bunny-720p

      - name: Download documentation assets
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: |
          mkdir -p assets
          wget https://archive.org/download/BigBuckBunny/big_buck_bunny_720p_h264.mov \
               -O assets/big_buck_bunny_720p_h264.mov

      - name: Set up Python
        run: uv python install

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Build HTML docs
        run: |
          uv run --group docs sphinx-build -b html -c docs/ docs/source/ docs/build/html/latest
          
          # Move the generated scenes and slides into the latest directory
          mv docs/build/html/latest/source/* docs/build/html/latest
          rm -rf docs/build/html/latest/source
          
          # Create a root redirect so visitors land on /latest/ by default
          echo '<meta http-equiv="refresh" content="0; url=latest/index.html" />' > docs/build/html/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
